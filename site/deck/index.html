<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luthien: Investor Deck</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=Lora:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #141216;
      --bg-elevated: #1A1720;
      --surface: #201C2A;
      --border: #28243A;
      --text: #EDE5D8;
      --text-dim: #9A92AE;
      --blue: #3B9494;
      --blue-glow: rgba(59, 148, 148, 0.15);
      --red: #C45050;
      --sans: 'Raleway', -apple-system, BlinkMacSystemFont, sans-serif;
      --body: 'Lora', Georgia, serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .logo {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(3rem, 8vw, 5rem);
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1;
      position: relative;
      display: inline-block;
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 10%;
      right: 10%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    .tagline {
      font-family: var(--body);
      font-size: clamp(1rem, 2vw, 1.35rem);
      color: var(--text-dim);
      margin-top: 20px;
    }

    .gate {
      text-align: center;
      margin-top: 48px;
      max-width: 360px;
      width: 100%;
    }

    .email-form {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .email-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .email-input::placeholder { color: var(--text-dim); }
    .email-input:focus { border-color: var(--blue); }

    .email-input.error {
      border-color: var(--red);
      animation: shake 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .submit-btn {
      padding: 12px 20px;
      background: var(--blue-glow);
      border: 1px solid var(--blue);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .submit-btn:hover {
      background: rgba(59, 148, 148, 0.28);
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    main { display: contents; }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="logo">Luthien</h1>
    <p class="tagline">AI's power is nothing without control</p>

    <div class="gate">
      <form class="email-form" onsubmit="return submitEmail(event)">
        <label for="email" class="sr-only">Email address</label>
        <input type="email" class="email-input" id="email" placeholder="Email" autocomplete="email" autofocus required>
        <button type="submit" class="submit-btn" aria-label="View deck">&rarr;</button>
      </form>
    </div>
  </main>

<script>
function submitEmail(e) {
  e.preventDefault();
  var input = document.getElementById('email');
  var email = input.value.trim();
  if (!email || !email.includes('@')) {
    input.classList.add('error');
    input.value = '';
    input.placeholder = 'Enter a valid email';
    setTimeout(function() { input.classList.remove('error'); }, 400);
    return false;
  }
  // Fire Tally form with email prefilled in hidden iframe
  var iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = 'https://tally.so/r/J9kdlK?email=' + encodeURIComponent(email);
  document.body.appendChild(iframe);
  // Navigate to deck (relative path works on both file:// and https://)
  var slide = window.location.hash || '#team';
  window.location.href = '../pitch/' + slide;
  return false;
}
</script>

<script data-goatcounter="https://luthien.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
