<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luthien: Investor Deck</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #141216;
      --white: #EDE5D8;
      --text-dim: #9A92AE;
      --blue: #3B9494;
      --sans: 'Raleway', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--white); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; }
    .logo-mark { font-family: var(--sans); font-weight: 800; font-size: clamp(3.5rem, 10vw, 6rem); color: var(--white); letter-spacing: -0.03em; line-height: 1; }
    .headline { font-family: var(--sans); font-weight: 800; font-size: clamp(1.4rem, 3.5vw, 2.2rem); color: var(--white); line-height: 1.2; letter-spacing: -0.02em; margin-top: 24px; }
    .subtitle { font-family: var(--sans); font-size: clamp(0.9rem, 1.6vw, 1.15rem); color: var(--text-dim); margin-top: 16px; max-width: 700px; line-height: 1.5; }
    .tally-wrap { margin-top: 48px; width: 100%; max-width: 480px; }
    body::after { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; }
  </style>
</head>
<body>
  <div class="logo-mark">Luthien</div>
  <h1 class="headline">AI's power is nothing without control</h1>
  <p class="subtitle">Enter your email to view the investor deck.</p>
  <div class="tally-wrap">
    <iframe data-tally-src="https://tally.so/embed/J9kdlK?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="200" frameborder="0" marginheight="0" marginwidth="0" title="Deck access"></iframe>
  </div>
  <script src="https://tally.so/widgets/embed.js"></script>
</body>
</html>
