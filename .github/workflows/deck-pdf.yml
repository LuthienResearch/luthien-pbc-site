name: Build Deck PDF

on:
  push:
    branches: [main]
    paths:
      - 'site/pitch/index.html'
      - 'scripts/build_deck_pdf.mjs'
      - '.github/workflows/deck-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "deck-pdf"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.48.0
          npx playwright install --with-deps chromium

      - name: Render deck to PDF
        run: node scripts/build_deck_pdf.mjs

      - name: Publish PDF to rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="deck-latest"
          # Delete previous release + tag (ignore if missing), then recreate.
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "Latest pitch deck PDF" \
            --notes "Auto-generated from site/pitch/index.html at commit ${{ github.sha }}." \
            --target "${{ github.sha }}" \
            luthien-deck.pdf
