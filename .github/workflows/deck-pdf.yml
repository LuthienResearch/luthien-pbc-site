name: Build Deck PDF

on:
  push:
    branches: [main]
    paths:
      - 'site/pitch/**'
      - 'site/assets/**'
      - 'scripts/build_deck_pdf.mjs'
      - '.github/workflows/deck-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

# Do NOT cancel in-progress runs: a half-finished upload would still win.
# Let runs queue so the latest commit's PDF is always what ends up live.
concurrency:
  group: "deck-pdf"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.48.0
          npx playwright install --with-deps chromium

      - name: Render deck to PDF
        run: node scripts/build_deck_pdf.mjs

      - name: Commit PDF to site/pitch.pdf
        # Serve the PDF as a same-origin static file from Cloudflare Pages.
        # Previously we uploaded to a GitHub release and redirected, but Chrome
        # blocks cross-origin download redirects as "potentially insecure" —
        # even when every hop is HTTPS. Committing the PDF into the deployed
        # directory makes /pitch.pdf a plain static file on luthien.cc.
        #
        # The workflow path filter excludes site/pitch.pdf, so this commit does
        # not retrigger this workflow (no loop).
        run: |
          mv luthien-deck.pdf site/pitch.pdf
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet site/pitch.pdf; then
            echo "PDF unchanged; nothing to commit."
            exit 0
          fi
          git add site/pitch.pdf
          git commit -m "Regenerate pitch deck PDF [skip ci]

Auto-generated from commit ${{ github.sha }}."
          git push origin HEAD:main
